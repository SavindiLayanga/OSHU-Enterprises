<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OSHU Enterprises | Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body data-page="contact">
    <div class="bg-grid"></div>
    <div class="page-wrap">
    <header class="site-header">
      <a class="brand" href="index.html"><span class="brand-text">OSHU//ENT</span></a>
      <button class="menu-toggle" aria-label="Toggle menu">Menu</button>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="products.html">Products</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>
    <main>
      <section class="page-head fade-in-up">
        <p class="eyebrow">05 // Reach Us</p>
        <h1 class="page-title">Start Your Order or Build</h1>
      </section>
      <section class="contact-grid reveal">
        <article class="card glass">
          <h3>Contact Details</h3>
          <p>+94 74 196 55 98</p>
          <p>oshuenterprises@gmail.com</p>
          <p>Ibbagamuwa, Sri Lanka</p>
        </article>
        <form class="card glass contact-form">
          <div class="field-water">
            <input type="text" placeholder="Your Name" autocomplete="name" />
          </div>
          <div class="field-water">
            <input type="email" placeholder="Email Address" autocomplete="email" />
          </div>
          <div class="field-water field-water--tall">
            <textarea rows="5" placeholder="Tell us what you need"></textarea>
          </div>
          <button class="btn btn-primary" type="button">Send Inquiry</button>
        </form>
      </section>
    </main>
    <footer class="site-footer"><p>Response target: within 2 business hours.</p></footer>
    </div>
    <script src="assets/main.js"></script>
  </body>
</html>
